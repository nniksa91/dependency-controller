apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod2-deployment
  namespace: job-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod2
  template:
    metadata:
      labels:
        app: pod2
    spec:
      containers:
        - name: pod2
          image: nginx:latest  # A valid image
          ports:
            - containerPort: 80
