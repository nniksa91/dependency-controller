apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dependencies.core.example.com
spec:
  group: core.example.com
  names:
    kind: Dependency
    plural: dependencies
    singular: dependency
    shortNames:
      - dep
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                dependency:
                  type: string
                  description: "The name of the resource (e.g., Deployment) that the dependent relies on."
                dependencyType:
                  type: string
                  description: "The type of the dependency resource (e.g., Deployment)."
                  enum:
                    - Deployment
                dependent:
                  type: string
                  description: "The name of the resource (e.g., Deployment, Job) that depends on the dependency."
                dependentType:
                  type: string
                  description: "The type of the dependent resource (e.g., Deployment, Job)."
                  enum:
                    - Deployment
                    - Job
            status:
              type: object
              properties:
                dependencyReady:
                  type: boolean
                  description: "Indicates if the dependency (e.g., Deployment) is fully ready."
                dependentScaledDown:
                  type: boolean
                  description: "Indicates if the dependent deployment is scaled down."
                dependentJobCreated:
                  type: boolean
                  description: "Indicates if the dependent Job has been created."
                lastKnownJobSpec:
                  type: object
                  description: "Stores the last known Job spec before it was deleted."
                  x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
