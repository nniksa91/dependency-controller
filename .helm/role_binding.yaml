apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dependency-controller-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: dependency-controller
    namespace: default
roleRef:
  kind: ClusterRole
  name: dependency-controller-clusterrole
  apiGroup: rbac.authorization.k8s.io
