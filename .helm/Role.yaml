apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dependency-controller-role
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - update
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - core.example.com
    resources:
      - dependencies
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - core.example.com
    resources:
      - dependencies/status
    verbs:
      - get
      - update
      - patch