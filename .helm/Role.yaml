# Least-privilege ClusterRole for the controller ServiceAccount.
# Keep in sync with config/rbac/role.yaml (generated from +kubebuilder:rbac markers).
# Do not add apiGroups/resources/verbs "*". For custom GVKs, copy rules from
# config/rbac/custom_dependency_reader_role.yaml after replacing placeholders.
# update on apps/* is required because internal/gate uses client.Update for replicas.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dependency-controller-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["core.example.com"]
    resources: ["dependencies"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["core.example.com"]
    resources: ["dependencies/status"]
    verbs: ["get", "update", "patch"]
