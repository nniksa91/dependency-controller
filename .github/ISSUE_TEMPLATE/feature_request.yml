name: Feature request
description: Suggest an enhancement to the dependency controller
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the controller behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: compose
    attributes:
      label: Related to Compose depends_on
      options:
        - label: This maps to a Docker Compose depends_on behavior
