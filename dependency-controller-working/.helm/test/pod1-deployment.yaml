apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod1-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod1
  template:
    metadata:
      labels:
        app: pod1
    spec:
      containers:
        - name: pod1
          image: non-existent-image:latest  # This image does not exist, so the pod will fail to start
          ports:
            - containerPort: 80

