apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dependency-controller-clusterrole
rules:
  - apiGroups:
      - ""  # Core API group (for pods, services, etc.)
    resources:
      - pods
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps  # API group for deployments
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - update
  - apiGroups:
      - core.example.com  # Custom API group for your CRD
    resources:
      - dependencies  # Your custom resource
      - dependencies/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
