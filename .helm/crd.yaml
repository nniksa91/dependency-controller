apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dependencies.core.example.com
spec:
  group: core.example.com
  names:
    kind: Dependency
    listKind: DependencyList
    plural: dependencies
    singular: dependency
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                dependency:
                  type: string
                dependent:
                  type: string
            status:
              type: object
              properties:
                dependencyReady:
                  type: boolean
                dependentScaledDown:
                  type: boolean
