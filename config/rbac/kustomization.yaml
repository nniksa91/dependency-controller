resources:
# Controller ServiceAccount + least-privilege manager-role (ClusterRole).
# Only manager-rolebinding and leader-election / metrics-auth bind to this SA.
# Never bind dependency-editor-role or dependency-viewer-role to the controller SA.
# You may comment out service_account.yaml if the manager uses an existing SA;
# update RoleBinding / ClusterRoleBinding subjects accordingly.
- service_account.yaml
- role.yaml
- role_binding.yaml
- leader_election_role.yaml
- leader_election_role_binding.yaml
# Metrics authn/authz (TokenReview + SubjectAccessReview create only).
# metrics-reader is for scrapers — not bound to the controller SA.
# Comment these out only if you disable metrics protection.
# More info: https://book.kubebuilder.io/reference/metrics.html
- metrics_auth_role.yaml
- metrics_auth_role_binding.yaml
- metrics_reader_role.yaml
# Human-facing helper ClusterRoles (no bindings here). Not used by the manager.
# Comment out if you do not want them installed with the Project.
- dependency_editor_role.yaml
- dependency_viewer_role.yaml
# Optional custom-CR template (placeholders) — apply manually after editing:
#   custom_dependency_reader_role.yaml

