version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      go-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      # Kubernetes / controller-runtime are upgraded manually as a coordinated
      # stack (Go version, codegen, CRDs, e2e). Dependabot's 0.x semver handling
      # can treat minor jumps as patch/minor and pull e.g. 0.30→0.36 via groups.
      - dependency-name: "k8s.io/api"
      - dependency-name: "k8s.io/apimachinery"
      - dependency-name: "k8s.io/client-go"
      - dependency-name: "sigs.k8s.io/controller-runtime"
      # Broader k8s.io modules: block major+minor; patches only if Dependabot
      # surfaces them outside the explicit list above.
      - dependency-name: "k8s.io/*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "github.com/onsi/ginkgo/v2"
        update-types: ["version-update:semver-major"]
      - dependency-name: "github.com/onsi/gomega"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Action major bumps often change Node runtime / inputs; batch separately.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
