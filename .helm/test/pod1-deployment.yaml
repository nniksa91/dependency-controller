# Demo "dependency" Deployment for Dependency CR (spec.dependency).
# Bad image → AvailableReplicas stays 0 → controller should keep the dependent at 0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod1-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod1
  template:
    metadata:
      labels:
        app: pod1
    spec:
      containers:
        - name: pod1
          image: non-existent-image:latest
          ports:
            - containerPort: 80

