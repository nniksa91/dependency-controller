# Deployment waits for a StatefulSet (Compose-style depends_on with typed kinds).
apiVersion: core.example.com/v1
kind: Dependency
metadata:
  name: app-waits-for-sts
  namespace: default
spec:
  condition: serviceHealthy
  dependency:
    apiVersion: apps/v1
    kind: StatefulSet
    name: db
  dependent:
    apiVersion: apps/v1
    kind: Deployment
    name: app
