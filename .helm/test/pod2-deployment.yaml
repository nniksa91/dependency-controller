# Demo "dependent" Deployment for Dependency CR (spec.dependent).
# With pod1 unavailable, the controller should scale this to 0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod2-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod2
  template:
    metadata:
      labels:
        app: pod2
    spec:
      containers:
        - name: pod2
          image: nginx:latest
          ports:
            - containerPort: 80
