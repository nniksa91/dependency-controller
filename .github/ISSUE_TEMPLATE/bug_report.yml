name: Bug report
description: Report a problem with the dependency controller
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this report. Please search existing issues first.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps and manifests (Dependency CR + related objects).
      render: yaml
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tag, release, or git SHA.
    validations:
      required: false
  - type: input
    id: k8s
    attributes:
      label: Kubernetes version
      placeholder: "v1.30.x"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Controller logs
      render: text
    validations:
      required: false
